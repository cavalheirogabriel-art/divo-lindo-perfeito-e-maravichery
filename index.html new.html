<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaísa Daher - A Muralha Brasileira</title>
    <style>
        :root {
            --gold: #ffd700;
            --green: #009739;
            --blue: #002776;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, var(--blue), var(--green));
            color: var(--white);
            padding: 2rem;
            border-bottom: 5px solid var(--gold);
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid var(--gold);
            object-fit: cover;
            margin-top: -100px;
            background: white;
        }

        section {
            background: white;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Estilo do Jogo */
        #game-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #ddd;
            border: 2px dashed var(--blue);
            overflow: hidden;
            cursor: crosshair;
            margin-top: 10px;
        }

        .ball {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3);
        }
