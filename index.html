<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaísa Daher - A Muralha Brasileira</title>
    <style>
        /* CSS - Estilização */
        :root {
            --brazil-yellow: #FFDF00;
            --brazil-blue: #002776;
            --brazil-green: #009b3a;
            --dark-gray: #222;
            --light-gray: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--dark-gray);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0, 39, 118, 0.8), rgba(0, 155, 58, 0.8)), 
                        url('https://images.unsplash.com/photo-1592656094267-764a45160876?auto=format&fit=crop&q=80&w=1000') center/cover;
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 5px solid var(--brazil-yellow);
        }

        .container {
            max-width: 900px;
            margin: -40px auto 40px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; }
        h2 { color: var(--brazil-blue); border-left: 5px solid var(--brazil-green); padding-left: 10px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--brazil-blue);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-number { font-size: 2rem; font-weight: bold; color: var(--brazil-yellow); }

        .btn-action {
            display: block;
            width: fit-content;
            margin: 20px auto;
            padding: 12px 30px;
            background-color: var(--brazil-green);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-action:hover { background-color: var(--brazil-blue); }

        #mensagem-interativa {
            text-align: center;
            font-style: italic;
            color: #555;
            min-height: 1.5em;
        }

        footer { text-align: center; padding: 20px; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>Thaísa Daher</h1>
        <p
